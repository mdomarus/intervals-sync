name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Lowest supported version and the current stable, to validate the floor.
        python-version: ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v8.3.2

      - name: Install dependencies
        run: uv sync --python ${{ matrix.python-version }}

      - name: Lint
        run: uv run --python ${{ matrix.python-version }} ruff check

      - name: Format check
        run: uv run --python ${{ matrix.python-version }} ruff format --check

      - name: Type check
        run: uv run --python ${{ matrix.python-version }} ty check

      - name: Test
        run: uv run --python ${{ matrix.python-version }} pytest -q
